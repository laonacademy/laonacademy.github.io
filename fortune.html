<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 주역 운세</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
       body {
    font-family: 'Malgun Gothic', sans-serif;
    background-color: #FAF6F0;
    color: #2B2B2B;
    max-width: 480px;
    margin: 0 auto;
    padding: 24px;
    line-height: 1.7;
}
h1 {
    font-family: 'Noto Serif KR', 'Batang', serif;
    color: #6B2D3C;
    font-size: 28px;
}
label {
    display: block;
    margin-top: 16px;
    font-weight: bold;
}
input {
    display: block;
    width: 100%;
    font-size: 18px;
    padding: 12px;
    border: 1px solid #C9A227;
    border-radius: 8px;
}
button {
    display: block;
    width: 100%;
    margin-top: 24px;
    background-color: #6B2D3C;
    color: white;
    font-size: 20px;
    font-weight: bold;
    padding: 14px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
}
    </style>
    </head>
<body>
    <h1>오늘의 주역 운세</h1>
    <p>생년월일을 입력하시면 오늘의 괘를 풀이해 드립니다</p>

    <label for="name">이름</label>
    <input type="text" id="name" placeholder="예: 최종덕">

    <label for="birth">생년월일</label>
    <input type="date" id="birth">

    <button id="btn-fortune">운세 보기</button>
    <div id="result" hidden></div>
    <script>
const btn = document.getElementById('btn-fortune');
        const result = document.getElementById('result');

        btn.addEventListener('click', async function () {
            const name = document.getElementById('name').value;
            const birth = document.getElementById('birth').value;

            if (!birth) {
                alert('생년월일을 입력해 주세요');
                return;
            }

            result.hidden = false;
            result.innerHTML = '<p>괘를 뽑고 있습니다…</p>';
            btn.disabled = true;

            try {
                const response = await fetch('https://laonacademy-github-io-cjd90059-9576s-projects.vercel.app/api/fortune', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, birth: birth })
                });

                const data = await response.json();

                if (data.error) {
                    result.innerHTML = '<p>' + data.error + '</p>';
                } else {
                    result.innerHTML = '<p>' + data.fortune.replace(/\n/g, '<br>') + '</p>';
                }
            } catch (err) {
                result.innerHTML = '<p>연결에 실패했습니다. 잠시 후 다시 시도해 주세요.</p>';
            }

            btn.disabled = false;
        });
    </script>
</body>
</html>
