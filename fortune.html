<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 주역 운세</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
       body {
    font-family: 'Malgun Gothic', sans-serif;
    background-color: #FAF6F0;
    color: #2B2B2B;
    max-width: 480px;
    margin: 0 auto;
    padding: 24px;
    line-height: 1.7;
}
h1 {
    font-family: 'Noto Serif KR', 'Batang', serif;
    color: #6B2D3C;
    font-size: 28px;
}
label {
    display: block;
    margin-top: 16px;
    font-weight: bold;
}
input {
    display: block;
    width: 100%;
    font-size: 18px;
    padding: 12px;
    border: 1px solid #C9A227;
    border-radius: 8px;
}
button {
    display: block;
    width: 100%;
    margin-top: 24px;
    background-color: #6B2D3C;
    color: white;
    font-size: 20px;
    font-weight: bold;
    padding: 14px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
}
    </style>
    </head>
<body>
    <h1>오늘의 주역 운세</h1>
    <p>생년월일을 입력하시면 오늘의 괘를 풀이해 드립니다</p>

    <label for="name">이름</label>
    <input type="text" id="name" placeholder="예: 최종덕">

    <label for="birth">생년월일</label>
    <input type="date" id="birth">

    <button id="btn-fortune">운세 보기</button>
    <div id="result" hidden></div>
    <script>
const btn = document.getElementById('btn-fortune');
        const result = document.getElementById('result');

        btn.addEventListener('click', function () {
            const name = document.getElementById('name').value;
            const birth = document.getElementById('birth').value;

            result.hidden = false;
            result.innerHTML = '<p>괘를 뽑고 있습니다…</p>';

            setTimeout(function () {
                result.innerHTML =
                    '<h2>오늘의 괘: 지천태(泰)</h2>' +
                    '<p>' + name + '님(' + birth + '생), 하늘과 땅이 통하니 막힌 일이 풀리는 날입니다.</p>';
            }, 2000);
        });
    </script>
</body>
</html>
